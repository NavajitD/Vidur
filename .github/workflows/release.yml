name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          zip -r vidur-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.zip" \
            --exclude "node_modules/*" \
            --exclude ".DS_Store"
          cp vidur-${{ steps.version.outputs.VERSION }}.zip vidur.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vidur ${{ steps.version.outputs.VERSION }}
          body: |
            ## Vidur ${{ steps.version.outputs.VERSION }}

            Visual redesign of any website with AI — without changing content.

            ### Install (Chrome / Edge / Brave)
            1. Download `vidur.zip` below and unzip it
            2. Go to `chrome://extensions` → Enable **Developer mode**
            3. Click **Load unpacked** → select the unzipped `vidur` folder

            ### Install (Firefox)
            1. Go to `about:debugging#/runtime/this-firefox`
            2. Click **Load Temporary Add-on** → select `manifest.json` from the unzipped folder
          files: |
            vidur-${{ steps.version.outputs.VERSION }}.zip
            vidur.zip
          draft: false
          prerelease: false