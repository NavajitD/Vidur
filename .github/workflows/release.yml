name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          zip -r vidur-${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.zip" \
            --exclude "node_modules/*" \
            --exclude ".DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vidur ${{ steps.version.outputs.VERSION }}
          body: |
            ## Vidur ${{ steps.version.outputs.VERSION }}

            AI-powered visual redesign for any website — without changing content.

            ### Install (Chrome / Edge)
            1. Download `vidur-${{ steps.version.outputs.VERSION }}.zip` below
            2. Unzip it
            3. Go to `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### Install (Firefox)
            1. Go to `about:debugging#/runtime/this-firefox`
            2. Click **Load Temporary Add-on** → select `manifest.json` from the unzipped folder
          files: vidur-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false